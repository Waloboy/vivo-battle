<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#1a1a2e" />
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007a" />
      <stop offset="100%" stop-color="#00d1ff" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)" />
  
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#brand)" stroke-width="12" opacity="0.3" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#brand)" stroke-width="6" opacity="0.6" />

  <!-- A-58 Symbol -->
  <g transform="translate(140, 160)">
    <!-- stylized A -->
    <path d="M116 0 L30 190 L70 190 L92 140 L140 140 L162 190 L202 190 Z M105 105 L127 105 L116 80 Z" fill="url(#brand)" />
    <!-- 58 -->
    <text x="116" y="270" font-family="Arial, sans-serif" font-weight="900" font-size="72" fill="#ffffff" text-anchor="middle" letter-spacing="4">58</text>
  </g>
</svg>
