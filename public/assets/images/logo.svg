<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#1a1a2e" />
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d1ff" />
      <stop offset="50%" stop-color="#7a00ff" />
      <stop offset="100%" stop-color="#ff007a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="112" />

  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="188" fill="none" stroke="url(#brand)" stroke-width="24" filter="url(#glow)" />
  
  <!-- Massive Inner A touching the ring -->
  <!-- Outer path: M 256 68 (top) L 115 380 (bottom left) L 175 380 (inner leg left) L 202 320 (crossbar left) L 310 320 (crossbar right) L 337 380 (inner leg right) L 397 380 (bottom right) -->
  <!-- Cutout path: M 256 201 L 229 260 L 283 260 Z -->
  <path d="M 256 68 L 115 380 L 175 380 L 202 320 L 310 320 L 337 380 L 397 380 Z M 256 201 L 229 260 L 283 260 Z" fill="url(#brand)" filter="url(#glow)" />

  <!-- The "58" watermark inside the A -->
  <text x="256" y="340" font-family="'Orbitron', 'Inter', sans-serif" font-size="130" font-weight="900" fill="#ffffff" opacity="0.3" text-anchor="middle" letter-spacing="-4">58</text>
</svg>
